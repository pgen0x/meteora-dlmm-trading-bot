name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so GoReleaser can build the changelog

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify tag matches main.go Version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          code="$(grep -oP 'var Version = "\K[^"]+' main.go)"
          if [ "$tag" != "$code" ]; then
            echo "::error::Tag v$tag does not match main.go Version ($code). Bump Version before tagging."
            exit 1
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
