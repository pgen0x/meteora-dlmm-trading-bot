version: 2

project_name: mdtb

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: mdtb
    binary: mdtb
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - CHANGELOG.md
      - .env.example

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: '^feat(\(.+\))?!?:'
      order: 0
    - title: Fixes
      regexp: '^fix(\(.+\))?!?:'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^test:'

release:
  draft: false
  prerelease: auto
  footer: |
    ---
    Full changelog: [CHANGELOG.md](https://github.com/pgen0x/meteora-dlmm-trading-bot/blob/master/CHANGELOG.md)
