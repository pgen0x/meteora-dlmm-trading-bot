version: 2

project_name: mdtb

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: mdtb
    binary: mdtb
    main: .
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - CHANGELOG.md
      - .env.example

checksum:
  name_template: checksums.txt

# release-please writes the release notes (and CHANGELOG.md); GoReleaser only
# attaches build artifacts to the release release-please already created.
changelog:
  disable: true

release:
  mode: keep-existing
  draft: false
  prerelease: auto
